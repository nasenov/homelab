hostname "LinuxGSM"

log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
sv_log_onefile 0

sys_ticrate 1000
sv_minupdaterate 101
sv_maxupdaterate 101
sv_cheats 0
sv_aim 0
pausable 0

mp_timelimit 15
mp_roundtime 1.92
mp_c4timer 35
mp_freezetime 0
mp_autoteambalance 0
mp_limitteams 0
mp_friendlyfire 1
mp_autokick 0

exec secrets.cfg
