---
services:
  meshcentral:
    container_name: meshcentral
    image: ghcr.io/ylianst/meshcentral:1.1.59
    restart: unless-stopped
    networks:
      apps_bridge:
    volumes:
      - /mnt/tank/apps/meshcentral/data:/opt/meshcentral/meshcentral-data
      - /mnt/tank/apps/meshcentral/files:/opt/meshcentral/meshcentral-files

networks:
  apps_bridge:
    external: true
