---
services:
  garage:
    container_name: garage
    image: dxflrs/garage:v2.2.0
    labels:
      - traefik.enable=true
      - traefik.http.routers.s3.rule=Host(`s3.truenas.nasenov.dev`)
      - traefik.http.routers.s3.service=s3
      - traefik.http.services.s3.loadbalancer.server.port=3900
      - traefik.http.routers.garage.rule=Host(`garage.truenas.nasenov.dev`)
      - traefik.http.routers.garage.service=garage
      - traefik.http.services.garage.loadbalancer.server.port=3903
    restart: unless-stopped
    environment:
      GARAGE_ALLOW_WORLD_READABLE_SECRETS: "true"
      GARAGE_RPC_SECRET_FILE: /run/secrets/garage-rpc-secret
      GARAGE_ADMIN_TOKEN_FILE: /run/secrets/garage-admin-token
    secrets:
      - garage-rpc-secret
      - garage-admin-token
    networks:
      apps_bridge:
    volumes:
      - /mnt/apps/garage/garage.toml:/etc/garage.toml
      - /mnt/apps/garage/meta:/var/lib/garage/meta
      - /mnt/apps/garage/data:/var/lib/garage/data

secrets:
  garage-rpc-secret:
    file: /mnt/apps/garage/garage-rpc-secret
  garage-admin-token:
    file: /mnt/apps/garage/garage-admin-token

networks:
  apps_bridge:
    external: true
