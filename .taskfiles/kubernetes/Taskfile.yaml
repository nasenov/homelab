---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  prune-pods:
    desc: Prune pods in Failed, Pending, or Succeeded state
    cmds:
      - for:
          matrix:
            PHASE: [ Failed, Pending, Succeeded ]
        cmd: kubectl delete pods --all-namespaces --field-selector status.phase={{.ITEM.PHASE}} --ignore-not-found=true
    preconditions:
      - which kubectl

  sync-external-secrets:
    desc: Sync all ExternalSecrets
    cmds:
      - for: { var: SECRETS, split: "\n" }
        cmd: kubectl --namespace {{splitList "," .ITEM | first}} annotate externalsecret {{splitList "," .ITEM | last}} force-sync="{{now | unixEpoch}}" --overwrite
    vars:
      SECRETS:
        sh: kubectl get externalsecret --all-namespaces --no-headers --output=jsonpath='{range .items[*]}{.metadata.namespace},{.metadata.name}{"\n"}{end}'
    preconditions:
      - which kubectl

  snapshot:
    desc: Snapshot an app [NS=default] [APP=required]
    requires:
      vars:
        - APP
    cmds:
      - kubectl --namespace {{.NS}} patch replicationsources {{.APP}} --type merge -p '{"spec":{"trigger":{"manual":"{{now | unixEpoch}}"}}}'
      - |-
        {{ if eq "true" .WAIT }}until kubectl --namespace {{.NS}} get job/{{.JOB}} &>/dev/null; do sleep 5; done{{ end }}
      - |-
        {{ if eq "true" .WAIT }}kubectl --namespace {{.NS}} wait job/{{.JOB}} --for=condition=complete --timeout=120m{{ end }}
    vars:
      WAIT: "{{.WAIT | default \"true\"}}"
      NS: "{{.NS | default \"default\"}}"
      JOB: volsync-src-{{.APP}}
    preconditions:
      - which kubectl
      - kubectl --namespace {{.NS}} get replicationsources {{.APP}}

  snapshot-all:
    desc: Snapshot all apps across all namespaces without waiting
    cmds:
      - for: { var: ALL_APPS, split: "\n" }
        task: snapshot
        vars:
          WAIT: "false"
          NS: "{{splitList \",\" .ITEM | first}}"
          APP: "{{splitList \",\" .ITEM | last}}"
    vars:
      ALL_APPS:
        sh: |
          kubectl get replicationsources -A --no-headers -o jsonpath='{range .items[*]}{.metadata.namespace},{.metadata.name}{"\n"}{end}'
    preconditions:
      - which kubectl
