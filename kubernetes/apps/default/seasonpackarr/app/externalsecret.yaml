---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seasonpackarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    template:
      data:
        SEASONPACKARR__CLIENTS_DEFAULT_USERNAME: "{{ .QBITTORRENT_ADMIN_USERNAME }}"
        SEASONPACKARR__CLIENTS_DEFAULT_PASSWORD: "{{ .QBITTORRENT_ADMIN_PASSWORD }}"
  data:
    - secretKey: QBITTORRENT_ADMIN_USERNAME
      remoteRef:
        key: 9ef9a9c7-e2ae-403d-a678-f26991119e42
    - secretKey: QBITTORRENT_ADMIN_PASSWORD
      remoteRef:
        key: c33298e4-d35c-420f-803d-bc4d2e150c04
