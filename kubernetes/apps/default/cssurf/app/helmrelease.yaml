---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cssurf
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cssurf
  values:
    controllers:
      cssurf:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          config:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
            command:
              - sh
              - -c
              - |
                cp /config/mapcycle.txt /data/serverfiles/cstrike/mapcycle.txt
                rm -f /data/serverfiles/cstrike/addons/amxmodx/configs/maps.ini
                cp /config/csserver.cfg /data/serverfiles/cstrike/csserver.cfg
                cp /secret/secrets.cfg /data/serverfiles/cstrike/secrets.cfg
                cp /config/lgsm.cfg /data/config-lgsm/csserver/common.cfg
        containers:
          app:
            image:
              repository: ghcr.io/gameservermanagers/gameserver
              tag: cs@sha256:f52bdd37bd733c2cacb459f81834b18b20d6392afb755b33747148744449dffd
            env:
              LGSM_GITHUBUSER: nasenov
              LGSM_GITHUBREPO: LinuxGSM
              LGSM_GITHUBBRANCH: fix/bump-amxmodx-version
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 256Mi

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.0.45
        ports:
          game:
            port: 27016
            protocol: UDP

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 4Gi
      config:
        type: configMap
        name: "{{ .Release.Name }}"
      secret:
        type: secret
        name: "{{ .Release.Name }}"
