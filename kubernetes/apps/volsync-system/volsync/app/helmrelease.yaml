---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
spec:
  interval: 1h
  chart:
    spec:
      chart: volsync
      version: 0.15.0
      sourceRef:
        kind: HelmRepository
        name: backube
  values:
    metrics:
      disableAuth: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: null
        memory: 512Mi
