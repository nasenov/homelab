---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-local
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    template:
      data:
        RESTIC_REPOSITORY: "{{ .VOLSYNC_GARAGE_ENDPOINT }}"
        RESTIC_PASSWORD: "{{ .VOLSYNC_RESTIC_PASSWORD }}"
        AWS_ACCESS_KEY_ID: "{{ .VOLSYNC_GARAGE_ACCESS_KEY }}"
        AWS_SECRET_ACCESS_KEY: "{{ .VOLSYNC_GARAGE_ACCESS_KEY_SECRET }}"
  data:
    - secretKey: VOLSYNC_GARAGE_ENDPOINT
      remoteRef:
        key: fb796fb6-8ac8-4ecb-b202-612dfc256c76
    - secretKey: VOLSYNC_RESTIC_PASSWORD
      remoteRef:
        key: 6d30bd48-05e5-4fc0-896b-3017b5ebcadd
    - secretKey: VOLSYNC_GARAGE_ACCESS_KEY
      remoteRef:
        key: 80922cff-4b60-42a0-bd9b-2edb33b1365c
    - secretKey: VOLSYNC_GARAGE_ACCESS_KEY_SECRET
      remoteRef:
        key: 2b945fdb-df66-48a3-aa70-8316de9aa764
---
