---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  values:
    toolbox:
      enabled: true
      resources:
        requests:
          memory: 32Mi
        limits:
          memory: 32Mi

    monitoring:
      enabled: true
      interval: 30s
      createPrometheusRules: true
      prometheusRuleOverrides:
        CephNodeDiskspaceWarning:
          disabled: true

    cephClusterSpec:
      cephConfig:
        global:
          mon_cluster_log_level: info
        mon:
          debug_mon: "0/5"
          debug_rocksdb: "0/5"
        mgr:
          debug_mgr: "0/5"
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
      csi:
        readAffinity:
          enabled: false # https://github.com/ceph/ceph-csi/issues/5772
      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
        prometheusEndpoint: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
      mgr:
        modules:
          - name: pg_autoscaler
            enabled: true
      network:
        connections:
          requireMsgr2: true
      storage:
        useAllNodes: true
        useAllDevices: false
        devicePathFilter: /dev/disk/by-id/nvme-KINGSTON_SKC3000S1024G_.*
      resources:
        mgr:
          requests:
            cpu: 100m
        mon:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 512Mi
        osd:
          requests:
            cpu: 100m
            memory: 2Gi
          limits:
            memory: 4Gi
        prepareosd:
          requests:
            cpu: 100m
        crashcollector:
          requests:
            memory: 32Mi
          limits:
            memory: 32Mi
        logcollector:
          requests:
            memory: 16Mi
          limits:
            memory: 16Mi
        cleanup:
          requests:
            cpu: 100m
        exporter:
          requests:
            memory: 32Mi
          limits:
            memory: 32Mi

    route:
      dashboard:
        host:
          name: rook.nasenov.dev
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: envoy-internal
            namespace: networking

    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          mountOptions:
            - discard
          parameters:
            compression_algorithm: zstd
            compression_mode: passive
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"

    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: true
      deletionPolicy: Delete

    cephFileSystems: []

    cephObjectStores: []
