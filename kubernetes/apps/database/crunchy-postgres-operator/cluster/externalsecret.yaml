---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crunchy-postgres
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    template:
      data:
        s3.conf: |
          [global]
          repo1-s3-key={{ .POSTGRESQL_GARAGE_ACCESS_KEY }}
          repo1-s3-key-secret={{ .POSTGRESQL_GARAGE_ACCESS_KEY_SECRET }}
          repo1-cipher-pass={{ .POSTGRESQL_BACKUP_ENCRYPTION_CIPHER_PASS }}
          repo2-s3-key={{ .POSTGRESQL_R2_ACCESS_KEY }}
          repo2-s3-key-secret={{ .POSTGRESQL_R2_ACCESS_KEY_SECRET }}
          repo2-cipher-pass={{ .POSTGRESQL_BACKUP_ENCRYPTION_CIPHER_PASS }}
  data:
    - secretKey: POSTGRESQL_GARAGE_ACCESS_KEY
      remoteRef:
        key: 28577773-0cde-47c9-90b2-0c136b2274c6
    - secretKey: POSTGRESQL_GARAGE_ACCESS_KEY_SECRET
      remoteRef:
        key: ad0bc000-ec94-4e08-a9bc-8df189f12b98
    - secretKey: POSTGRESQL_BACKUP_ENCRYPTION_CIPHER_PASS
      remoteRef:
        key: 90c2cc3c-defa-4e1d-8c78-78c23769e626
    - secretKey: POSTGRESQL_R2_ACCESS_KEY
      remoteRef:
        key: 983533e3-51eb-4c51-a917-f303c2a558bc
    - secretKey: POSTGRESQL_R2_ACCESS_KEY_SECRET
      remoteRef:
        key: ade4234d-67b5-4d7e-b5c9-f76d4c2201b4
