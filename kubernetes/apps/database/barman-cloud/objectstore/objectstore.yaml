---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: garage
spec:
  retentionPolicy: 30d
  configuration:
    destinationPath: s3://postgres/barman-cloud/database
    endpointURL: https://s3.truenas.nasenov.dev
    s3Credentials:
      accessKeyId:
        name: garage
        key: ACCESS_KEY
      secretAccessKey:
        name: garage
        key: ACCESS_KEY_SECRET
    data:
      compression: bzip2
    wal:
      compression: bzip2
  instanceSidecarConfiguration:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 64Mi
