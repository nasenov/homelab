---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
spec:
  uid: 345941b8-786a-4924-9465-3f109c8361b4
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    type: prometheus
    name: prometheus
    access: proxy
    isDefault: true
    url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: alertmanager
spec:
  uid: eb649bce-93a2-4dbe-b558-e7739ed5903e
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    type: alertmanager
    name: alertmanager
    access: proxy
    jsonData:
      implementation: prometheus
    url: http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: miscale2pg
spec:
  uid: e63033e0-b892-4acb-b709-9eacece5f411
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    type: postgres
    name: miscale2pg
    access: proxy
    url: ${POSTGRES_DATASOURCE_URL}
    user: ${POSTGRES_DATASOURCE_USER}
    secureJsonData:
      password: ${POSTGRES_DATASOURCE_PASSWORD}
    jsonData:
      database: ${POSTGRES_DATASOURCE_DATABASE}
      sslmode: require
      maxOpenConns: 4
      maxIdleConnsAuto: true
  valuesFrom:
    - targetPath: url
      valueFrom:
        secretKeyRef:
          name: grafana-miscale2pg-datasource-configuration
          key: POSTGRES_DATASOURCE_URL
    - targetPath: jsonData.database
      valueFrom:
        secretKeyRef:
          name: grafana-miscale2pg-datasource-configuration
          key: POSTGRES_DATASOURCE_DATABASE
    - targetPath: user
      valueFrom:
        secretKeyRef:
          name: grafana-miscale2pg-datasource-configuration
          key: POSTGRES_DATASOURCE_USER
    - targetPath: secureJsonData.password
      valueFrom:
        secretKeyRef:
          name: grafana-miscale2pg-datasource-configuration
          key: POSTGRES_DATASOURCE_PASSWORD
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: infinity
spec:
  uid: c21ac472-da08-4012-ae55-7b428c6caa21
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    type: yesoreyeram-infinity-datasource
    name: infinity
    access: proxy
    url: http://miscale2pg.development.svc.cluster.local/api/measurements
    jsonData:
      secureQueryName1: from
      secureQueryName2: to
    secureJsonData:
      secureQueryValue1: ${__from:date:iso}
      secureQueryValue2: ${__to:date:iso}
  plugins:
    - name: yesoreyeram-infinity-datasource
      version: latest
