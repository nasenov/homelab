---
alerting:
  discord:
    webhook-url: ${GATUS_DISCORD_WEBHOOK_URL}
    default-alert:
      description: health check failed
      send-on-resolved: true
      success-threshold: 5
      failure-threshold: 5

connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

endpoints:
  # External Group
  - name: flux-webhook
    group: external
    url: https://flux-webhook.nasenov.dev
    conditions:
      - "[STATUS] == 404"
    client:
      dns-resolver: tcp://1.1.1.1:53
    alerts:
      - type: discord
  - name: kromgo
    group: external
    url: https://kromgo.nasenov.dev
    conditions:
      - "[STATUS] == 200"
    client:
      dns-resolver: tcp://1.1.1.1:53
    alerts:
      - type: discord

  # Internal Group
  - name: actual
    group: internal
    url: https://actual.nasenov.dev
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord
  - name: alertmanger
    group: internal
    url: https://alertmanager.nasenov.dev
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord
