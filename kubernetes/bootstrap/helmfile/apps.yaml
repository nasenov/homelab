---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# Bootstraps core applications that provide a minimal runtime base for the
# cluster. These releases are installed first so the cluster has the resources
# Flux needs before its own reconciliation begins.
#
# After this bootstrap phase, Flux is ready to take over management of the
# application stack and continue reconciling downstream state.

bases:
  - defaults.yaml

helmDefaults:
  cleanupOnFail: true
  # forceConflicts: true # requires helm v4
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    inherit:
      - template: default
    hooks:
      - # Wait for CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - --timeout=2m
          - crd/ciliuml2announcementpolicies.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
        events:
          - postsync
        showlogs: true
      - # Apply Resources
        command: kubectl
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --namespace={{ .Release.Namespace }}
          - --filename=../../apps/{{ .Release.Namespace }}/{{ .Release.Name }}/config/l2.yaml
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - kube-system/cilium

  - name: spegel
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - kube-system/coredns

  - name: cert-manager
    namespace: cert-manager
    inherit:
      - template: default
    needs:
      - kube-system/spegel

  - name: external-secrets
    namespace: external-secrets
    inherit:
      - template: default
    hooks:
      # Apply Resources
      - command: kubectl
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --namespace={{ .Release.Namespace }}
          - --filename=../../apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/certificate.yaml
        events:
          - presync
        showlogs: true
      # Wait for CRDs to be available
      - command: kubectl
        args:
          - wait
          - --for=create
          - --timeout=2m
          - crd/clustersecretstores.external-secrets.io
        events:
          - postsync
        showlogs: true
      # Apply Resources
      - command: kubectl
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --filename=../../apps/{{ .Release.Namespace }}/{{ .Release.Name }}/store/clustersecretstore.yaml
        events:
          - postsync
        showlogs: true
    needs:
      - cert-manager/cert-manager

  - name: flux-operator
    namespace: flux-system
    inherit:
      - template: default
    needs:
      - external-secrets/external-secrets

  - name: flux-instance
    namespace: flux-system
    inherit:
      - template: default
    needs:
      - flux-system/flux-operator
