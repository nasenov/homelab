---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  args:
    - --force-conflicts
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: spegel
    namespace: kube-system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.7.0
    values:
      - ./templates/values.yaml.gotmpl

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.2
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - kube-system/spegel

  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.4.1
    values:
      - ./templates/values.yaml.gotmpl
    hooks:
      # Apply Certificate Resources
      - command: kubectl
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --namespace={{ .Release.Namespace }}
          - --filename=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/certificate.yaml
        events:
          - presync
        showlogs: true
      # Wait for ExternalSecrets CRDs to be available
      - command: kubectl
        args:
          - wait
          - --for=create
          - --timeout=2m
          - crd/clustersecretstores.external-secrets.io
        events:
          - postsync
        showlogs: true
      # Apply ExternalSecret Resources
      - command: kubectl
        args:
          - apply
          - --server-side
          - --force-conflicts
          - --filename=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/store/clustersecretstore.yaml
        events:
          - postsync
        showlogs: true
    needs:
      - cert-manager/cert-manager

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.48.0
    needs:
      - external-secrets/external-secrets

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.48.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - flux-system/flux-operator
