---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

includes:
  kubernetes: .taskfiles/kubernetes
  talos: .taskfiles/talos
  terraform: .taskfiles/terraform

tasks:
  default:
    cmd: task --list
    silent: true

  bootstrap:
    desc: Bootstrap workstation
    cmds:
      - task: terraform:init
      - task: terraform:sync-tfvars
      - task: talos:fetch-talosconfig
      - task: talos:fetch-kubeconfig
